<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner — Daily Task Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <svg class="sidebar-logo" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="5" width="20" height="18" rx="3"/>
            <line x1="9" y1="10" x2="19" y2="10"/>
            <line x1="9" y1="14" x2="17" y2="14"/>
            <line x1="9" y1="18" x2="14" y2="18"/>
            <polyline points="17,13 19,15 22,11"/>
          </svg>
          <span class="sidebar-title">Planner</span>
        </div>
        <nav id="sidebar-nav" class="sidebar-nav">
          <button class="sidebar-btn active" data-view="today">
            <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="6.5"/><line x1="9" y1="5" x2="9" y2="9"/><line x1="9" y1="9" x2="12" y2="9"/></svg>
            Today
          </button>
          <button class="sidebar-btn" data-view="overdue">
            <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="6.5"/><line x1="9" y1="5" x2="9" y2="9"/><line x1="9" y1="9" x2="6" y2="9"/></svg>
            Overdue
          </button>
          <button class="sidebar-btn" data-view="upcoming">
            <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="6.5"/><line x1="9" y1="5" x2="9" y2="9"/><line x1="9" y1="9" x2="12" y2="12"/></svg>
            Upcoming
          </button>
          <button class="sidebar-btn" data-view="completed">
            <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9.5L7.5 12L13 6.5"/><circle cx="9" cy="9" r="6.5"/></svg>
            Completed
          </button>
          <button class="sidebar-btn" data-view="all">
            <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="12" height="12" rx="2"/><line x1="3" y1="8" x2="15" y2="8"/><line x1="8" y1="3" x2="8" y2="15"/></svg>
            All Tasks
          </button>
        </nav>
      </div>
      <div class="sidebar-bottom">
        <div class="profile-card">
          <div class="profile-avatar">U</div>
          <div class="profile-info">
            <span class="profile-name">User</span>
            <span class="profile-role">ETL & AI Developer</span>
          </div>
          <button class="profile-settings" id="dark-mode-toggle" title="Toggle theme">☾</button>
        </div>
      </div>
    </aside>

    <div id="main-area">
      <header id="header">
        <div class="header-left">
          <div class="greeting" id="greeting"></div>
        </div>
        <div class="header-center">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="14" y2="14"/></svg>
            <input type="text" class="search-input" id="search-input" placeholder="Search tasks, pipelines, agents..." aria-label="Search tasks">
          </div>
        </div>
        <div class="header-right">
          <button class="btn btn-primary header-add-btn" id="add-task-btn">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg>
            New Task
          </button>
          <span class="current-date" id="current-date"></span>
          <div class="header-avatar">U</div>
        </div>
      </header>

      <div id="top-cards" class="top-cards"></div>

      <section id="task-section" class="task-section">
        <div class="task-section-header">
          <div class="task-tabs" id="task-tabs">
            <button class="task-tab active" data-filter="all">All</button>
            <button class="task-tab" data-filter="high">High Priority</button>
            <button class="task-tab" data-filter="pending">Pending</button>
            <button class="task-tab" data-filter="completed">Completed</button>
          </div>
          <div id="controls" class="task-controls"></div>
        </div>
        <div id="task-list" class="task-list"></div>
      </section>
    </div>

    <aside id="right-column">
      <div class="mini-stats">
        <div class="mini-stat" id="bottom-streak">
          <span class="mini-stat-icon">🔥</span>
          <span class="mini-stat-value" id="streak-val">0</span>
          <span class="mini-stat-label">Streak</span>
        </div>
        <div class="mini-stat" id="bottom-focus">
          <span class="mini-stat-icon">⏱</span>
          <span class="mini-stat-value" id="focus-val">0</span>
          <span class="mini-stat-label">Focus</span>
        </div>
        <div class="mini-stat" id="bottom-done">
          <span class="mini-stat-icon">✓</span>
          <span class="mini-stat-value" id="done-val">0</span>
          <span class="mini-stat-label">Done</span>
        </div>
        <div class="mini-stat" id="bottom-achieve">
          <span class="mini-stat-icon">🏆</span>
          <span class="mini-stat-value" id="achieve-val">0</span>
          <span class="mini-stat-label">Achieve</span>
        </div>
      </div>
      <div class="widget" id="widget-upcoming">
        <div class="widget-header">
          <span class="widget-title">Upcoming</span>
          <span class="widget-count" id="upcoming-count">0</span>
        </div>
        <div class="widget-body" id="upcoming-list"></div>
      </div>
      <div class="widget" id="widget-calendar">
        <div class="widget-header">
          <span class="widget-title">Calendar</span>
        </div>
        <div class="widget-body" id="calendar-grid"></div>
      </div>
      <div class="widget" id="widget-categories">
        <div class="widget-header">
          <span class="widget-title">Categories</span>
        </div>
        <div class="widget-body" id="categories-list"></div>
      </div>
    </aside>
  </div>
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal"></div>
  </div>

  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-dialog" id="confirm-dialog"></div>
  </div>

  <div id="toast-container"></div>
  <div class="confetti-container" id="confetti-container"></div>

  <div class="kbd-hint" id="kbd-hint">
    <span><kbd>N</kbd> New task</span>
    <span><kbd>/</kbd> Search</span>
    <span><kbd>Esc</kbd> Close</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
