<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner — Daily Task Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
  <style>
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg-primary: #f6f3ff;
  --bg-secondary: #ffffff;
  --bg-sidebar: #e4dff5;
  --bg-tertiary: #eeecf6;
  --bg-hover: #f0edf7;
  --text-primary: #2d2640;
  --text-secondary: #7a7396;
  --text-muted: #a9a2c0;
  --border-color: #e8e4f0;
  --border-light: #f0ecf5;
  --primary: #8b7cf7;
  --primary-light: #f0edff;
  --primary-hover: #7a6be6;
  --primary-glow: rgba(139, 124, 247, 0.08);
  --accent-pink: #f4a7bb;
  --accent-pink-light: #fceef2;
  --accent-mint: #7bc9a0;
  --accent-mint-light: #edf8f2;
  --accent-blue: #89b8f0;
  --accent-blue-light: #eef4fc;
  --accent-yellow: #f0c974;
  --accent-yellow-light: #fef7e8;
  --danger: #e8829a;
  --danger-light: #fdf0f3;
  --success: #7bc9a0;
  --success-light: #edf8f2;
  --warning: #f0c974;
  --warning-light: #fef7e8;
  --info: #89b8f0;
  --shadow-sm: 0 1px 3px rgba(139, 124, 247, 0.06);
  --shadow-md: 0 4px 16px rgba(139, 124, 247, 0.08);
  --shadow-lg: 0 8px 32px rgba(139, 124, 247, 0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

[data-theme="dark"] {
  --bg-primary: #0f0d1a;
  --bg-secondary: #1a1730;
  --bg-sidebar: #1a1730;
  --bg-tertiary: #232040;
  --bg-hover: #2a2648;
  --text-primary: #f0edf8;
  --text-secondary: #b8b0d0;
  --text-muted: #7a7298;
  --border-color: #322e50;
  --border-light: #282448;
  --primary: #a89aff;
  --primary-light: #2a2658;
  --primary-hover: #9788f0;
  --primary-glow: rgba(168, 154, 255, 0.12);
  --accent-pink: #f7b8cc;
  --accent-pink-light: #3a2030;
  --accent-mint: #8cdbb0;
  --accent-mint-light: #20382a;
  --accent-blue: #9ac6f5;
  --accent-blue-light: #203040;
  --accent-yellow: #f5d68a;
  --accent-yellow-light: #3a3020;
  --danger: #f09aae;
  --danger-light: #3a2028;
  --success: #8cdbb0;
  --success-light: #20382a;
  --warning: #f5d68a;
  --warning-light: #3a3020;
  --info: #9ac6f5;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
}

html { font-size: 14.5px; }

body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

#app {
  display: flex;
  max-width: 1280px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 0;
}

/* ===== Sidebar ===== */
#sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  padding: 28px 16px 20px;
  position: sticky;
  top: 0;
  height: 100vh;
}

#sidebar .sidebar-inner {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  flex: 1;
  min-height: 0;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
  padding: 0 8px;
}

.sidebar-logo {
  width: 26px;
  height: 26px;
  color: var(--primary);
}

.sidebar-title {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sidebar-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 0.88rem;
  font-weight: 500;
  font-family: var(--font);
  padding: 10px 12px 10px 16px;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  width: 100%;
  text-align: left;
  position: relative;
  margin-left: -4px;
}

.sidebar-btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.6;
  transition: opacity 0.2s;
}

.sidebar-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.sidebar-btn:hover svg { opacity: 0.8; }

.sidebar-btn.active {
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}

.sidebar-btn.active::before {
  content: "";
  position: absolute;
  left: -4px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  background: var(--primary);
  border-radius: 0 2px 2px 0;
}

.sidebar-btn.active svg { opacity: 1; }

.sidebar-bottom {
  padding-top: 16px;
  border-top: 1px solid var(--border-color);
}

.profile-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: var(--bg-secondary);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s;
}

.profile-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

.profile-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 600;
  flex-shrink: 0;
}

.profile-info {
  flex: 1;
  min-width: 0;
}

.profile-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-primary);
  display: block;
}

.profile-role {
  font-size: 0.7rem;
  color: var(--text-muted);
  display: block;
}

.profile-settings {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1rem;
  padding: 4px;
  border-radius: 4px;
  transition: color 0.15s;
}

.profile-settings:hover { color: var(--primary); }

/* ===== Main Area ===== */
#main-area {
  flex: 1;
  padding: 28px 32px 32px;
  min-width: 0;
}

/* ===== Header ===== */
#header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 28px;
}

.header-left { flex-shrink: 0; }

.greeting {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.03em;
  line-height: 1.3;
}

.greeting span { color: var(--primary); }

.header-center { flex: 1; }

.search-wrap {
  position: relative;
  max-width: 320px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-muted);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 9px 12px 9px 34px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  font-size: 0.82rem;
  font-family: var(--font);
  color: var(--text-primary);
  background: var(--bg-secondary);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

.search-input::placeholder { color: var(--text-muted); }

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.header-add-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  font-size: 0.82rem;
  font-weight: 600;
  white-space: nowrap;
}

.header-add-btn svg { width: 14px; height: 14px; }

.current-date {
  font-size: 0.82rem;
  color: var(--text-secondary);
  font-weight: 450;
  white-space: nowrap;
}

.header-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 600;
}

/* ===== Top Cards ===== */
#top-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}

.top-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  box-shadow: var(--shadow-sm);
}

.top-card-progress {
  display: flex;
  align-items: center;
  gap: 16px;
}

.top-card-progress-ring { flex-shrink: 0; }

.progress-ring-bg { stroke: var(--bg-tertiary); }

.progress-ring-fill { stroke: var(--primary); transition: stroke-dashoffset 0.6s ease; }

.top-card-progress-info { flex: 1; }

.top-card-progress-label {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.top-card-progress-value {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.1;
  margin-top: 2px;
}

.top-card-progress-detail {
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* Quote card */
.top-card-quote {
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-size: cover;
  background-position: center;
  position: relative;
  color: #fff;
  min-height: 120px;
}

.top-card-quote::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(45,38,64,0.55) 0%, rgba(45,38,64,0.3) 100%);
  pointer-events: none;
}

.top-card-quote > * {
  position: relative;
  z-index: 1;
}

.quote-text {
  font-size: 0.88rem;
  font-style: italic;
  color: rgba(255,255,255,0.92);
  line-height: 1.5;
}

.quote-author {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.6);
  margin-top: 6px;
  font-style: normal;
}

.quote-refresh {
  align-self: flex-end;
  background: rgba(255,255,255,0.15);
  border: none;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 0.85rem;
  border-radius: 6px;
  margin-bottom: 4px;
  transition: transform 0.3s, background 0.15s;
}

.quote-refresh:hover { transform: rotate(180deg); background: rgba(255,255,255,0.25); }

.quote-empty-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 80px;
}

.quote-empty-text {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.85);
  font-weight: 500;
  text-align: center;
}

/* Score card */
.top-card-score {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.score-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.score-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 500;
}

.score-value {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--primary);
}

.score-bar-wrap {
  height: 5px;
  background: var(--bg-tertiary);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 4px;
}

.score-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent-pink));
  border-radius: 4px;
  transition: width 0.6s ease;
}

.score-detail {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 6px;
}

/* ===== Task Section ===== */
.task-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}

.task-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-tertiary);
  padding: 3px;
  border-radius: var(--radius-md);
}

.task-tab {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 0.78rem;
  font-weight: 500;
  font-family: var(--font);
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
}

.task-tab:hover { color: var(--text-primary); }

.task-tab.active {
  background: var(--bg-secondary);
  color: var(--text-primary);
  box-shadow: var(--shadow-sm);
}

.task-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.control-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 500;
}

.sort-select {
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  font-size: 0.78rem;
  font-family: var(--font);
  color: var(--text-primary);
  background: var(--bg-secondary);
  cursor: pointer;
  outline: none;
}

.sort-select:focus { border-color: var(--primary); }

/* ===== Task List ===== */
#task-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.task-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.25s, border-color 0.25s, transform 0.25s;
  animation: cardIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  position: relative;
  overflow: hidden;
}

.task-card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
  transition: opacity 0.25s;
  opacity: 0;
}

.task-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-color); transform: translateY(-2px); }
.task-card:hover::before { opacity: 1; }

.task-card.overdue { border-left-color: var(--accent-pink); }
.task-card.overdue::before { background: var(--accent-pink); opacity: 1; }

.task-card.completed { opacity: 0.55; }
.task-card.completed:hover { opacity: 0.8; }
.task-card.completed::before { background: var(--accent-mint); opacity: 1; }

.task-card-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.task-checkbox-wrap {
  padding-top: 2px;
}

.task-checkbox {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-color);
  border-radius: 6px;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  background: var(--bg-secondary);
  transition: all 0.2s;
  flex-shrink: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.task-checkbox:checked {
  background: var(--accent-mint);
  border-color: var(--accent-mint);
}

.task-checkbox:checked::after {
  content: '';
  position: absolute;
  width: 5px;
  height: 10px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  top: 1px;
}

.task-checkbox:active { transform: scale(0.85); }

.task-checkbox:checked { animation: checkboxPop 0.3s ease; }

@keyframes checkboxPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.task-content { flex: 1; min-width: 0; }

.task-title {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 3px;
  word-break: break-word;
  line-height: 1.4;
}

.task-title.completed-text {
  text-decoration: line-through;
  color: var(--text-muted);
}

.task-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
  font-size: 0.76rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

.task-project {
  background: var(--primary-light);
  color: var(--primary);
  padding: 2px 10px;
  border-radius: 20px;
  font-weight: 500;
  font-size: 0.7rem;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.task-project-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.task-due { color: var(--text-muted); }
.task-due.overdue-text { color: var(--danger); font-weight: 500; }
.task-due.today-text { color: var(--primary); font-weight: 500; }

.task-dates {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  color: var(--text-muted);
  flex-wrap: wrap;
}

.status-indicator {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 0.72rem;
  color: var(--text-muted);
}

.task-notes {
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.task-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}

.task-tag {
  font-size: 0.68rem;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  padding: 2px 10px;
  border-radius: 12px;
}

.task-card-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  margin-left: 8px;
}

.priority-badge {
  font-size: 0.62rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.priority-high { background: var(--accent-pink-light); color: var(--danger); }
.priority-medium { background: var(--accent-yellow-light); color: var(--warning); }
.priority-low { background: var(--accent-mint-light); color: var(--success); }

.status-select {
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 0.68rem;
  font-family: var(--font);
  color: var(--text-primary);
  background: var(--bg-secondary);
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.status-select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-glow); }

.task-action-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 5px;
  border-radius: 6px;
  font-size: 0.82rem;
  transition: all 0.15s;
  line-height: 1;
}

.task-action-btn:hover { color: var(--text-primary); background: var(--bg-hover); transform: scale(1.1); }
.task-action-btn.danger:hover { color: var(--danger); background: var(--danger-light); }

.task-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border-light);
}

.task-estimate { font-size: 0.72rem; color: var(--text-muted); }

.important-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 0.9rem;
  padding: 4px;
  border-radius: 4px;
  transition: all 0.15s;
}

.important-btn:hover { color: var(--accent-yellow); background: var(--accent-yellow-light); }
.important-btn.active { color: var(--accent-yellow); }

.reschedule-input {
  border: none;
  background: none;
  font-size: 0.72rem;
  font-family: var(--font);
  color: var(--primary);
  cursor: pointer;
  outline: none;
  max-width: 150px;
}

.reschedule-input::-webkit-calendar-picker-indicator { display: none; }
.reschedule-input::-moz-calendar-picker-indicator { display: none; }

.completed-separator {
  display: flex;

/* ===== Toast ===== */
#toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 12px 18px;
  box-shadow: var(--shadow-lg);
  font-size: 0.85rem;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: toastIn 0.3s ease both;
  pointer-events: auto;
  min-width: 200px;
  max-width: 320px;
}

.toast.removing { animation: toastOut 0.25s ease both; }

.toast-success { border-left: 3px solid var(--accent-mint); }
.toast-error { border-left: 3px solid var(--accent-pink); }
.toast-info { border-left: 3px solid var(--primary); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(100%) scale(0.95); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateX(0) scale(1); }
  to { opacity: 0; transform: translateX(100%) scale(0.95); }
}

  z-index: 3000;

  <script>
const App = (() => {
  const STORAGE_KEY = 'task-planner-data';

  function setCookie(key, value, days) {
    try {
      const d = new Date();
      d.setDate(d.getDate() + (days || 365));
      document.cookie = key + '=' + encodeURIComponent(value) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
    } catch (e) { /* ignore */ }
  }

  function getCookie(key) {
    try {
      const match = document.cookie.match(new RegExp('(^| )' + key + '=([^;]+)'));
      return match ? decodeURIComponent(match[2]) : null;
    } catch (e) { return null; }
  }

  function deleteCookie(key) {
    document.cookie = key + '=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/';
  }

  // ===== SVG Helpers =====
  function iconCompleted(sz) {
    sz = sz || 14;
    return `<svg width="${sz}" height="${sz}" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="6"/><path d="M4.5 7.5L6 9L9.5 5"/></svg>`;
  }
  function iconInProgress(sz) {
    sz = sz || 14;
    return `<svg width="${sz}" height="${sz}" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="7" r="6"/><circle cx="7" cy="7" r="3" fill="currentColor" stroke="none"/></svg>`;
  }
  function iconNotStarted(sz) {
    sz = sz || 14;
    return `<svg width="${sz}" height="${sz}" viewBox="0 0 14 14" fill="none" stroke="var(--text-muted)" stroke-width="1.2" opacity="0.5"><circle cx="7" cy="7" r="6"/></svg>`;
  }
  function iconBlocked(sz) {
    sz = sz || 14;
    return `<svg width="${sz}" height="${sz}" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="7" cy="7" r="6"/><line x1="7" y1="4.5" x2="7" y2="8"/><circle cx="7" cy="10.2" r="0.7" fill="currentColor" stroke="none"/></svg>`;
  }
  function progressRingSVG(pct) {
    const r = 14, circ = 2 * Math.PI * r, off = circ - (pct / 100) * circ;
    return `<svg class="progress-ring" width="38" height="38" viewBox="0 0 38 38"><circle class="progress-ring-bg" cx="19" cy="19" r="${r}" fill="none" stroke-width="3"/><circle class="progress-ring-fill" cx="19" cy="19" r="${r}" fill="none" stroke-width="3" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 19 19)"/><text x="19" y="20.5" text-anchor="middle" font-size="8.5" fill="var(--text-secondary)" font-weight="600">${pct}%</text></svg>`;
  }
  function emptyStateSVG() {
    return `<svg width="100" height="80" viewBox="0 0 100 80" fill="none" stroke="var(--border-color)" stroke-width="1.6"><rect x="25" y="10" width="50" height="60" rx="5" opacity="0.7"/><rect x="30" y="15" width="40" height="50" rx="3" opacity="0.4"/><line x1="36" y1="28" x2="64" y2="28" opacity="0.35"/><line x1="36" y1="36" x2="64" y2="36" opacity="0.35"/><line x1="36" y1="44" x2="54" y2="44" opacity="0.35"/><path d="M58 50L61 53L68 45" opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M42 10V7a3 3 0 0 1 6 0v3" opacity="0.7"/><line x1="36" y1="18" x2="64" y2="18" opacity="0.7"/></svg>`;
  }
  function statusIcon(status, sz) {
    switch(status) {
      case 'completed': return iconCompleted(sz);
      case 'in-progress': return iconInProgress(sz);
      case 'blocked': return iconBlocked(sz);
      default: return iconNotStarted(sz);
    }
  }
  function projectColor(name) {
    if (!name) return 'var(--primary)';
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    const h = ((hash % 360) + 360) % 360;
    return `hsl(${h}, 60%, 55%)`;
  }

  const SCENIC_IMAGES = [
    'https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1490750967868-88aa4f44baee?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1470071459604-7b8ec44ffd0c?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1439853949127-fa647821eba0?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&h=200&fit=crop&auto=format',
    'https://images.unsplash.com/photo-1518173946687-a36f968f7db8?w=400&h=200&fit=crop&auto=format'
  ];

  const QUOTES = [
    { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
    { text: "You don't have to be extreme, just consistent.", author: "Unknown" },
    { text: "Small daily improvements over time lead to stunning results.", author: "Robin Sharma" },
    { text: "Focus on being productive instead of busy.", author: "Tim Ferriss" },
    { text: "The key is not to prioritize what's on your schedule, but to schedule your priorities.", author: "Stephen Covey" },
    { text: "It's not about having time. It's about making time.", author: "Unknown" },
    { text: "Done is better than perfect.", author: "Sheryl Sandberg" },
    { text: "The best time to start was yesterday. The next best time is now.", author: "Unknown" },
    { text: "Success is the sum of small efforts, repeated day in and day out.", author: "Robert Collier" },
    { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe" }
  ];

  // ===== Toast =====
  function showToast(msg, type) {
    type = type || 'info';
    const container = document.getElementById('toast-container');
    if (!container) return;
    const el = document.createElement('div');
    el.className = 'toast toast-' + type;
    const icons = { success: '✓', error: '✕', info: '→' };
    el.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + escHtml(msg) + '</span>';
    container.appendChild(el);
    setTimeout(() => {
      el.classList.add('removing');
      setTimeout(() => el.remove(), 250);
    }, 2500);
  }

  // ===== Confetti =====
  function confetti() {
    const container = document.getElementById('confetti-container');
    if (!container) return;
    container.innerHTML = '';
    const colors = ['var(--primary)', 'var(--success)', 'var(--warning)', 'var(--danger)', 'var(--info)'];
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      piece.style.cssText = `
        left: ${Math.random() * 100}%;
        top: -10px;
        background: ${color};
        width: ${4 + Math.random() * 6}px;
        height: ${4 + Math.random() * 6}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${1.5 + Math.random() * 2}s;
        animation-delay: ${Math.random() * 0.5}s;
      `;
      container.appendChild(piece);
    }
    setTimeout(() => container.innerHTML = '', 4000);
  }

  function checkAllDoneConfetti() {
    const today = todayStr();
    const todayTasks = state.tasks.filter(t => sameDay(t.dueDate, today));
    const done = todayTasks.filter(t => t.status === 'completed').length;
    if (todayTasks.length > 0 && done === todayTasks.length) {
      confetti();
    }
  }

  // ===== Notifications =====
  let notifiedTasks = new Set();

  function requestNotifPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  async function registerSW() {
    if (!('serviceWorker' in navigator)) return;
    try {
      const reg = await navigator.serviceWorker.register('sw.js');
      console.log('SW registered');
    } catch (e) {
      console.log('SW registration skipped:', e.message);
    }
  }

  async function sendNotif(title, body, tag) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    try {
      const notif = new Notification(title, { body, tag, icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📋</text></svg>' });
      setTimeout(() => notif.close(), tag === 'hourly-summary' ? 8000 : 5000);
    } catch (e) { /* ignore */ }
    try {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg && reg.active) reg.active.postMessage({ title, body, tag });
    } catch (e) { /* ignore */ }
  }

  function checkOverdueNotifs() {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const now = new Date();
    state.tasks.forEach(t => {
      if (t.status === 'completed' || notifiedTasks.has(t.id)) return;
      if (t.notify === false) return;
      if (!t.dueDate) return;
      const due = new Date(t.dueDate.includes('T') ? t.dueDate : t.dueDate + 'T23:59');
      if (due <= now) {
        notifiedTasks.add(t.id);
        const timeStr = t.dueDate.includes('T') ? ' at ' + t.dueDate.split('T')[1].slice(0, 5) : '';
        sendNotif('Task Overdue!', `"${t.title}" was due ${formatDate(t.dueDate)}${timeStr}`, 'overdue-' + t.id);
      }
    });
  }

  let remindedTasks = new Set();
  let lastHourlyNotif = 0;

  function checkReminders() {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const now = new Date();
    state.tasks.forEach(t => {
      if (t.status === 'completed' || remindedTasks.has(t.id)) return;
      if (!t.reminder) return;
      const remindAt = new Date(t.reminder.includes('T') ? t.reminder : t.reminder + 'T23:59');
      if (remindAt <= now) {
        remindedTasks.add(t.id);
        const timeStr = t.reminder.includes('T') ? ' at ' + t.reminder.split('T')[1].slice(0, 5) : '';
        sendNotif('Task Reminder', `"${t.title}" reminder${timeStr}${t.dueDate ? ' — due ' + formatDate(t.dueDate) : ''}`, 'reminder-' + t.id);
      }
    });
    clearRemindedCache();
  }

  function checkHourlySummary() {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const now = new Date();
    const hour = now.getHours();
    if (hour < 15 || hour >= 21) return;
    if (now.getTime() - lastHourlyNotif < 3600000) return;
    lastHourlyNotif = now.getTime();
    const overdue = state.tasks.filter(t => isOverdue(t) && t.notify !== false);
    const todayDue = state.tasks.filter(t => sameDay(t.dueDate, todayStr()) && t.status !== 'completed' && t.notify !== false);
    if (overdue.length === 0 && todayDue.length === 0) return;
    let body = '';
    if (overdue.length) body += `${overdue.length} overdue task${overdue.length > 1 ? 's' : ''}`;
    if (todayDue.length) { if (body) body += ' • '; body += `${todayDue.length} due today`; }
    if (overdue.length <= 2) body += '\n' + overdue.map(t => '• ' + t.title).join('\n');
    if (todayDue.length <= 2) body += '\n' + todayDue.map(t => '• ' + t.title).join('\n');
    sendNotif('Task Summary (' + hour + ':00)', body, 'hourly-summary');
  }

  function clearRemindedCache() {
    const validIds = new Set(state.tasks.map(t => t.id));
    for (const id of notifiedTasks) { if (!validIds.has(id)) notifiedTasks.delete(id); }
    for (const id of remindedTasks) { if (!validIds.has(id)) remindedTasks.delete(id); }
  }

  let state = {
    tasks: [],
    view: 'today',
    searchQuery: '',
    sortBy: 'priority',
    filterPriority: 'all',
    filterStatus: 'all',
    darkMode: false,
    topPriorityIds: [],
    userName: 'User',
    userRole: 'ETL & AI Developer',
    selectedDate: null,
    calMonth: new Date().getMonth(),
    calYear: new Date().getFullYear()
  };

  let editingTaskId = null;
  let taskIdCounter = Date.now();

  function todayStr() {
    return new Date().toISOString().split('T')[0];
  }

  function formatEstimate(minutes) {
    if (!minutes || minutes <= 0) return '';
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    if (h && m) return `${h}h ${m}m`;
    if (h) return `${h}h`;
    return `${m}m`;
  }

  function parseEstimate(str) {
    if (!str || typeof str !== 'string') return Number(str) || 0;
    const s = str.trim().toLowerCase();
    let total = 0;
    const hMatch = s.match(/(\d+)\s*h/);
    const mMatch = s.match(/(\d+)\s*m/);
    if (hMatch) total += parseInt(hMatch[1]) * 60;
    if (mMatch) total += parseInt(mMatch[1]);
    return total || Number(s) || 0;
  }

  function formatDate(dateStr, relative) {
    if (!dateStr) return '';
    const hasTime = dateStr.includes('T');
    const dateObj = new Date(hasTime ? dateStr : dateStr + 'T00:00:00');
    const today = new Date(todayStr());
    const diff = Math.round((dateObj - today) / 86400000);
    const timeStr = hasTime ? dateStr.split('T')[1].slice(0, 5) : '';

    if (diff === 0) return timeStr ? `Today ${timeStr}` : 'Today';
    if (diff === -1) return timeStr ? `Yesterday ${timeStr}` : 'Yesterday';
    if (diff === 1) return timeStr ? `Tomorrow ${timeStr}` : 'Tomorrow';

    if (diff < -1) {
      const days = Math.abs(diff);
      if (relative || diff > -7) return `${days} days ago${timeStr ? ' ' + timeStr : ''}`;
    }

    if (diff > 1) {
      if (relative || diff < 7) return `In ${diff} days${timeStr ? ' ' + timeStr : ''}`;
    }

    return dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + (timeStr ? ' ' + timeStr : '');
  }

  function isOverdue(task) {
    if (!task.dueDate || task.status === 'completed') return false;
    const due = new Date(task.dueDate.includes('T') ? task.dueDate : task.dueDate + 'T23:59');
    return due < new Date();
  }

  function isToday(dateStr) {
    if (!dateStr) return false;
    return dateOnly(dateStr) === todayStr();
  }

  function dateOnly(d) {
    return d && d.includes('T') ? d.split('T')[0] : d;
  }

  function sameDay(dateStr, dayStr) {
    if (!dateStr || !dayStr) return false;
    return dateOnly(dateStr) === dayStr;
  }



  function generateId() {
    return 't' + (++taskIdCounter);
  }

  function getFilteredTasks() {
    let tasks = [...state.tasks];
    const today = todayStr();

    tasks = tasks.filter(t => {
      if (state.searchQuery) {
        const q = state.searchQuery.toLowerCase();
        const matchTitle = t.title.toLowerCase().includes(q);
        const matchProject = (t.project || '').toLowerCase().includes(q);
        const matchTags = (t.tags || []).some(tag => tag.toLowerCase().includes(q));
        if (!matchTitle && !matchProject && !matchTags) return false;
      }
      if (state.filterPriority !== 'all' && t.priority !== state.filterPriority) return false;
      if (state.filterStatus !== 'all' && state.filterStatus === 'pending' && t.status !== 'not-started' && t.status !== 'in-progress') return false;
      if (state.filterStatus !== 'all' && state.filterStatus !== 'pending' && t.status !== state.filterStatus) return false;
      return true;
    });

    if (state.selectedDate) {
      tasks = tasks.filter(t => sameDay(t.dueDate, state.selectedDate) || sameDay(t.startDate, state.selectedDate) || sameDay(t.assignedDate, state.selectedDate));
    } else {
      switch (state.view) {
        case 'today':
          tasks = tasks.filter(t => sameDay(t.dueDate, today) || t.status === 'in-progress');
          break;
        case 'overdue':
          tasks = tasks.filter(t => isOverdue(t));
          break;
        case 'upcoming':
          tasks = tasks.filter(t => t.dueDate && dateOnly(t.dueDate) > today && t.status !== 'completed');
          break;
        case 'completed':
          tasks = tasks.filter(t => t.status === 'completed');
          break;
        case 'all':
          break;
      }
    }

    tasks.sort((a, b) => {
      const prioOrder = { high: 0, medium: 1, low: 2 };
      switch (state.sortBy) {
        case 'priority':
          const pa = prioOrder[a.priority] ?? 1;
          const pb = prioOrder[b.priority] ?? 1;
          if (pa !== pb) return pa - pb;
          return (b.createdAt || 0) - (a.createdAt || 0);
        case 'dueDate':
          if (!a.dueDate) return 1;
          if (!b.dueDate) return -1;
          const da = dateOnly(a.dueDate);
          const db = dateOnly(b.dueDate);
          if (da !== db) return da.localeCompare(db);
          return (a.dueDate || '').localeCompare(b.dueDate || '');
        case 'status': {
          const sOrder = { 'not-started': 0, 'in-progress': 1, 'blocked': 2, 'completed': 3 };
          const sa = sOrder[a.status] ?? 0;
          const sb = sOrder[b.status] ?? 0;
          return sa - sb;
        }
        case 'title':
          return a.title.localeCompare(b.title);
        default:
          return 0;
      }
    });

    return tasks;
  }

  function getSummaryStats() {
    const today = todayStr();
    const all = state.tasks;
    const totalToday = all.filter(t => sameDay(t.dueDate, today)).length;
    const inProgress = all.filter(t => t.status === 'in-progress').length;
    const completed = all.filter(t => t.status === 'completed').length;
    const overdue = all.filter(t => isOverdue(t)).length;
    return { totalToday, inProgress, completed, overdue };
  }

  function getTodayProgress() {
    const today = todayStr();
    const todayTasks = state.tasks.filter(t => sameDay(t.dueDate, today));
    const total = todayTasks.length;
    const done = todayTasks.filter(t => t.status === 'completed').length;
    return { total, done, percent: total > 0 ? Math.round((done / total) * 100) : 0 };
  }

  function getTopPriorities() {
    const today = todayStr();
    const todayTasks = state.tasks.filter(t => sameDay(t.dueDate, today));
    const pinned = todayTasks.filter(t => state.topPriorityIds.includes(t.id) && t.status !== 'completed');
    pinned.sort((a, b) => {
      const prioOrder = { high: 0, medium: 1, low: 2 };
      return (prioOrder[a.priority] ?? 1) - (prioOrder[b.priority] ?? 1);
    });
    if (pinned.length >= 3) return pinned.slice(0, 3);

    const unpinned = todayTasks.filter(t => !state.topPriorityIds.includes(t.id) && t.status !== 'completed');
    unpinned.sort((a, b) => {
      const prioOrder = { high: 0, medium: 1, low: 2 };
      return (prioOrder[a.priority] ?? 1) - (prioOrder[b.priority] ?? 1);
    });

    return [...pinned, ...unpinned].slice(0, 3);
  }

  function getTaskById(id) {
    return state.tasks.find(t => t.id === id);
  }

  function addTask(data) {
    const task = {
      id: generateId(),
      title: data.title.trim(),
      notes: (data.notes || '').trim(),
      project: (data.project || '').trim(),
      startDate: data.startDate || '',
      dueDate: data.dueDate || '',
      priority: data.priority || 'medium',
      status: data.status || 'not-started',
      estimatedTime: data.estimatedTime ? Number(data.estimatedTime) : 0,
      timeSpent: data.timeSpent ? Number(data.timeSpent) : 0,
      assignedDate: data.assignedDate || todayStr(),
      tags: data.tags ? data.tags.split(',').map(t => t.trim()).filter(Boolean) : [],
      important: data.important || false,
      notify: data.notify !== false,
      reminder: data.reminder || '',
      createdAt: Date.now()
    };
    state.tasks.push(task);
    saveState();
    render();
    showToast('Task added', 'success');
    return task;
  }

  function updateTask(id, data) {
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx === -1) return null;
    const task = state.tasks[idx];
    if (data.title !== undefined) task.title = data.title.trim();
    if (data.notes !== undefined) task.notes = data.notes.trim();
    if (data.project !== undefined) task.project = data.project.trim();
    if (data.dueDate !== undefined) task.dueDate = data.dueDate;
    if (data.startDate !== undefined) task.startDate = data.startDate;
    if (data.priority !== undefined) task.priority = data.priority;
    if (data.status !== undefined) task.status = data.status;
    if (data.estimatedTime !== undefined) task.estimatedTime = Number(data.estimatedTime) || 0;
    if (data.timeSpent !== undefined) task.timeSpent = Number(data.timeSpent) || 0;
    if (data.assignedDate !== undefined) task.assignedDate = data.assignedDate;
    if (data.tags !== undefined) {
      task.tags = data.tags.split(',').map(t => t.trim()).filter(Boolean);
    }
    if (data.important !== undefined) task.important = data.important;
    if (data.notify !== undefined) task.notify = data.notify;
    if (data.reminder !== undefined) task.reminder = data.reminder;
    saveState();
    render();
    return task;
  }

  function deleteTask(id) {
    const delTask = getTaskById(id);
    state.tasks = state.tasks.filter(task => task.id !== id);
    state.topPriorityIds = state.topPriorityIds.filter(pid => pid !== id);
    saveState();
    render();
    if (delTask) showToast('"' + delTask.title + '" deleted', 'error');
  }

  function toggleComplete(id) {
    const task = getTaskById(id);
    if (!task) return;
    const newStatus = task.status === 'completed' ? 'in-progress' : 'completed';
    updateTask(id, { status: newStatus });
    if (newStatus === 'completed') {
      showToast('"' + task.title + '" completed', 'success');
      checkAllDoneConfetti();
    }
  }

  function toggleImportant(id) {
    const task = getTaskById(id);
    if (!task) return;
    updateTask(id, { important: !task.important });
  }

  function toggleTopPriority(id) {
    const idx = state.topPriorityIds.indexOf(id);
    if (idx > -1) {
      state.topPriorityIds.splice(idx, 1);
    } else {
      if (state.topPriorityIds.length >= 3) {
        state.topPriorityIds.shift();
      }
      state.topPriorityIds.push(id);
    }
    saveState();
    render();
  }

  function isTopPriority(id) {
    return state.topPriorityIds.includes(id);
  }

  function updateStatus(id, status) {
    updateTask(id, { status });
  }

  function updatePriority(id, priority) {
    updateTask(id, { priority });
  }

  function rescheduleTask(id, newDate) {
    updateTask(id, { dueDate: newDate });
  }

  function renderRightWidgets() {
    const today = todayStr();

    // Upcoming
    const upcoming = allTasks.filter(t => t.dueDate && dateOnly(t.dueDate) >= today && t.status !== 'completed')
      .sort((a, b) => a.dueDate.localeCompare(b.dueDate)).slice(0, 5);
    const upcomingCount = document.getElementById('upcoming-count');
    const upcomingList = document.getElementById('upcoming-list');
    if (upcomingCount) upcomingCount.textContent = upcoming.length;
    if (upcomingList) {
      upcomingList.innerHTML = upcoming.length > 0 ? upcoming.map(t => `
        <div class="upcoming-item">
          <span class="upcoming-dot" style="background:${projectColor(t.project)}"></span>
          <span class="upcoming-title">${escHtml(t.title)}</span>
          <span class="upcoming-date">${formatDate(t.dueDate)}</span>
        </div>
      `).join('') : '<div style="color:var(--text-muted);font-size:0.78rem;padding:8px 0;">No upcoming tasks</div>';
    }

    // Calendar
    renderCalendar();

    // Categories

    if (catList) {
      const entries = Object.entries(projects);
      catList.innerHTML = entries.length > 0 ? entries.map(([name, data]) => {
        const pct = data.total > 0 ? Math.round((data.done / data.total) * 100) : 0;
        return `
          <div class="category-item">
            <span class="category-color" style="background:${projectColor(name)}"></span>
            <span class="category-name">${escHtml(name)}</span>

          </div>
          <div class="category-bar-wrap">
            <div class="category-bar-fill" style="width:${pct}%;background:${projectColor(name)}"></div>
          </div>
        `;
      }).join('') : '<div style="color:var(--text-muted);font-size:0.78rem;padding:8px 0;">No categories yet</div>';
    }

  function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    if (!grid) return;
    const year = state.calYear;
    const month = state.calMonth;
    const now = new Date();
    const today = now.getDate();
    const isCurrentMonth = month === now.getMonth() && year === now.getFullYear();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrev = new Date(year, month, 0).getDate();

    const dayHeaders = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];

    const taskDates = new Map();
    state.tasks.forEach(t => {
      [t.dueDate, t.startDate, t.assignedDate].forEach(d => {
        if (d) {
          const dayKey = d.includes('T') ? d.split('T')[0] : d;
          const key = dayKey.slice(0, 7);
          if (key === `${year}-${String(month + 1).padStart(2, '0')}`) {
            if (!taskDates.has(dayKey)) taskDates.set(dayKey, []);
            taskDates.get(dayKey).push(sameDay(d, t.dueDate) ? 'due' : sameDay(d, t.startDate) ? 'start' : 'assigned');
          }
        }
      });
    });

    let html = `<div class="calendar-header">
      <select class="cal-month-select" id="cal-month-select">
        ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].map((m,i) => `<option value="${i}" ${i === month ? 'selected' : ''}>${m}</option>`).join('')}
      </select>
      <select class="cal-year-select" id="cal-year-select">
        ${Array.from({length: 11}, (_,i) => year - 5 + i).map(y => `<option value="${y}" ${y === year ? 'selected' : ''}>${y}</option>`).join('')}
      </select>
      <button class="cal-today-btn" id="cal-today-btn">Today</button>
    </div><div class="calendar-grid">`;

    dayHeaders.forEach(d => { html += `<span class="calendar-day-header">${d}</span>`; });

    for (let i = firstDay - 1; i >= 0; i--) {
      html += `<span class="calendar-day other-month">${daysInPrev - i}</span>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const cls = [];
      if (isCurrentMonth && d === today) cls.push('today');
      if (state.selectedDate === dateStr) cls.push('selected');
      const dots = taskDates.get(dateStr);
      let dotHtml = '';
      if (dots && dots.length > 0) {
        const types = [...new Set(dots)];
        if (types.length === 1) {
          dotHtml = `<span class="task-dot ${types[0]}"></span>`;
        } else {
          dotHtml = `<span class="task-dot multi"></span>`;
        }
      }
      html += `<span class="calendar-day ${cls.join(' ')}" data-date="${dateStr}">${d}${dotHtml}</span>`;
    }

    const totalCells = firstDay + daysInMonth;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let i = 1; i <= remaining; i++) {
      html += `<span class="calendar-day other-month">${i}</span>`;
    }

    html += '</div>';
    grid.innerHTML = html;

    document.getElementById('cal-month-select')?.addEventListener('change', e => {
      state.calMonth = parseInt(e.target.value);
      renderCalendar();
    });
    document.getElementById('cal-year-select')?.addEventListener('change', e => {
      state.calYear = parseInt(e.target.value);
      renderCalendar();
    });
    document.getElementById('cal-today-btn')?.addEventListener('click', () => {
      const now = new Date();
      state.calMonth = now.getMonth();
      state.calYear = now.getFullYear();
      const todayStr = now.toISOString().split('T')[0];
      state.selectedDate = todayStr;
      state.view = 'all';
      state.searchQuery = '';
      document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.sidebar-btn[data-view="all"]')?.classList.add('active');
      const searchInput = document.getElementById('search-input');
      if (searchInput) searchInput.value = '';
      renderCalendar();
      render();
    });

    grid.querySelectorAll('.calendar-day[data-date]').forEach(el => {
      el.addEventListener('click', () => {
        const date = el.dataset.date;
        state.selectedDate = date;
        state.view = 'all';
        state.searchQuery = '';
        document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.sidebar-btn[data-view="all"]')?.classList.add('active');
        const searchInput = document.getElementById('search-input');
        if (searchInput) searchInput.value = '';
        renderCalendar();
        render();
      });
    });
  }

  function renderBottomStrip() {
    const today = todayStr();
    const all = state.tasks;
    const streak = calculateStreak();
    const totalFocus = all.reduce((s, t) => s + (t.estimatedTime || 0), 0);
    const completed = all.filter(t => t.status === 'completed').length;
    const achievements = completed >= 10 ? Math.floor(completed / 10) : 0;
    setText('streak-val', streak);
    setText('focus-val', totalFocus);
    setText('done-val', completed);
    setText('achieve-val', achievements);
  }

  function calculateStreak() {
    let streak = 0;
    const d = new Date();
    for (let i = 0; i < 30; i++) {
      const dateStr = d.toISOString().split('T')[0];
      const hasCompleted = state.tasks.some(t => sameDay(t.dueDate, dateStr) && t.status === 'completed');
      if (hasCompleted) streak++;
      else if (i > 0) break;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }

  function setText(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  function renderTaskList() {
    const container = document.getElementById('task-list');
    if (!container) return;
    const tasks = getFilteredTasks();
    const activeTasks = tasks.filter(t => t.status !== 'completed');
    const completedTasks = tasks.filter(t => t.status === 'completed');

    if (tasks.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-illustration">${emptyStateSVG()}</div>
          <div class="empty-state-text">No tasks to show</div>
          <div class="empty-state-hint">${state.view === 'today' ? 'Add a task for today to get started.' : 'Try adjusting your filters.'}</div>
        </div>
      `;
      return;
    }

    let html = '';
    activeTasks.forEach((t, i) => { html += renderTaskCard(t, i); });

    if (completedTasks.length > 0) {
      html += `<div class="completed-separator">Completed (${completedTasks.length})</div>`;
      completedTasks.forEach((t, i) => { html += renderTaskCard(t, activeTasks.length + i); });
    }

    container.innerHTML = html;
    bindTaskEvents();
  }

  function renderTaskCard(task, index) {
    index = index || 0;
    const priorityClass = 'priority-' + (task.priority || 'medium');
    const isCompleted = task.status === 'completed';
    const overdue = isOverdue(task) && !isCompleted;
    const pColor = projectColor(task.project);

    const dates = [];
    if (task.startDate) dates.push(`<span style="color:var(--accent-blue);">S: ${formatDate(task.startDate, true)}</span>`);
    if (task.assignedDate) dates.push(`<span style="color:var(--accent-mint);">A: ${formatDate(task.assignedDate, true)}</span>`);
    if (task.dueDate) {
      const label = formatDate(task.dueDate);
      let cls = '';
      if (overdue) cls = 'overdue-text';
      else if (isToday(task.dueDate)) cls = 'today-text';
      dates.push(`<span class="${cls}">Due: ${escHtml(label)}</span>`);
    }
    const dateHtml = dates.length ? `<span class="task-dates">${dates.join(' · ')}</span>` : '';

    const tagsHtml = (task.tags || []).map(tag =>
      `<span class="task-tag">${escHtml(tag)}</span>`
    ).join('');

    const notesHtml = task.notes ? `<div class="task-notes">${escHtml(task.notes)}</div>` : '';
    const estimateHtml = task.estimatedTime ? `<span class="task-estimate">${formatEstimate(task.estimatedTime)}</span>` : '';
    const spentHtml = task.timeSpent ? `<span class="task-estimate" style="color:var(--primary);">${formatEstimate(task.timeSpent)} spent</span>` : '';
    const reminderHtml = task.reminder ? `<span class="task-estimate" style="color:var(--accent-yellow);" title="Reminder: ${formatDate(task.reminder)}">🔔 ${formatDate(task.reminder)}</span>` : '';
    const noNotifHtml = task.notify === false ? `<span class="task-estimate" style="color:var(--text-muted);" title="Overdue notifications disabled">🔕</span>` : '';

    return `
      <div class="task-card ${overdue ? 'overdue' : ''} ${isCompleted ? 'completed' : ''}" data-id="${task.id}" style="animation-delay:${index * 0.04}s">
        <div class="task-card-header">
          <div class="task-checkbox-wrap">
            <input type="checkbox" class="task-checkbox" ${isCompleted ? 'checked' : ''} data-id="${task.id}">
          </div>
          <div class="task-content">
            <div class="task-title ${isCompleted ? 'completed-text' : ''}">${escHtml(task.title)}</div>
            <div class="task-meta">
              ${task.project ? `<span class="task-project" style="background:${pColor}18;color:${pColor};"><span class="task-project-dot" style="background:${pColor};"></span>${escHtml(task.project)}</span>` : ''}
              ${dateHtml}
              <span class="status-indicator">${statusIcon(task.status, 12)}<span style="text-transform:capitalize;">${task.status.replace('-', ' ')}</span></span>
            </div>
            ${notesHtml}
            ${tagsHtml ? `<div class="task-tags">${tagsHtml}</div>` : ''}
          </div>
          <div class="task-card-actions">
            <button class="important-btn ${task.important ? 'active' : ''}" data-id="${task.id}" title="Mark important">${task.important ? '★' : '☆'}</button>
            <span class="priority-badge ${priorityClass}">${task.priority}</span>
            <select class="status-select" data-id="${task.id}">
              <option value="not-started" ${task.status === 'not-started' ? 'selected' : ''}>Not Started</option>
              <option value="in-progress" ${task.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
              <option value="blocked" ${task.status === 'blocked' ? 'selected' : ''}>Blocked</option>
              <option value="completed" ${task.status === 'completed' ? 'selected' : ''}>Complete</option>
            </select>
          </div>
        </div>
        <div class="task-card-footer">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            ${estimateHtml}
            ${spentHtml}
            ${reminderHtml}
            ${noNotifHtml}
            <input type="datetime-local" class="reschedule-input" value="${task.dueDate || ''}" data-id="${task.id}" title="Reschedule">
          </div>
          <div style="display:flex;align-items:center;gap:4px;">
            <button class="task-action-btn" data-id="${task.id}" data-action="edit" title="Edit">✎</button>
            <button class="task-action-btn danger" data-id="${task.id}" data-action="delete" title="Delete">✕</button>
          </div>
        </div>
      </div>
    `;
  }

  function bindTaskEvents() {
    document.querySelectorAll('.task-checkbox').forEach(cb => {
      cb.addEventListener('change', () => toggleComplete(cb.dataset.id));
    });

    document.querySelectorAll('.important-btn').forEach(btn => {
      btn.addEventListener('click', () => toggleImportant(btn.dataset.id));
    });

    document.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', () => updateStatus(sel.dataset.id, sel.value));
    });

    document.querySelectorAll('.reschedule-input').forEach(inp => {
      inp.addEventListener('change', () => {
        if (inp.value) rescheduleTask(inp.dataset.id, inp.value);
      });
    });

    document.querySelectorAll('[data-action="edit"]').forEach(btn => {
      btn.addEventListener('click', () => openEditModal(btn.dataset.id));
    });

    document.querySelectorAll('[data-action="delete"]').forEach(btn => {
      btn.addEventListener('click', () => confirmDelete(btn.dataset.id));
    });
  }

  // ===== Modals =====

  function openAddModal() {
    editingTaskId = null;
    const overlay = document.getElementById('modal-overlay');
    const modal = document.getElementById('modal');
    modal.innerHTML = `
      <div class="modal-header">
        <span class="modal-title">New Task</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="task-form">
        <div class="form-group">
          <label class="form-label" for="f-title">Title *</label>
          <input type="text" class="form-input" id="f-title" required placeholder="e.g. Build data pipeline for sales ingestion">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-notes">Notes</label>
          <textarea class="form-textarea" id="f-notes" placeholder="Source tables, transformation logic, LLM agent config..."></textarea>
        </div>
        <div class="form-row form-row-3">
          <div class="form-group">
            <label class="form-label" for="f-project">Project</label>
            <input type="text" class="form-input" id="f-project" placeholder="e.g. Data Platform, AI Agent, Analytics">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-start">Start Date</label>
            <input type="date" class="form-input" id="f-start" value="${todayStr()}">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-due">Due Date & Time</label>
            <input type="datetime-local" class="form-input" id="f-due">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-priority">Priority</label>
            <select class="form-select" id="f-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-status">Status</label>
            <select class="form-select" id="f-status">
              <option value="not-started" selected>Not Started</option>
              <option value="in-progress">In Progress</option>
              <option value="blocked">Blocked</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-estimate">Est. Time</label>
            <input type="text" class="form-input" id="f-estimate" placeholder="e.g. 1h 30m">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-spent">Time Spent</label>
            <input type="text" class="form-input" id="f-spent" placeholder="e.g. 45m">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-tags">Tags (comma separated)</label>
            <input type="text" class="form-input" id="f-tags" placeholder="e.g. python, sql, langchain, airflow">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-assigned">Assigned Date</label>
            <input type="date" class="form-input" id="f-assigned" value="${todayStr()}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-reminder">Reminder</label>
            <input type="datetime-local" class="form-input" id="f-reminder">
            <span style="font-size:0.7rem;color:var(--text-muted);">Notify me before the due date</span>
          </div>
          <div class="form-checkbox" style="padding-top:22px;">
            <input type="checkbox" id="f-notify" checked>
            <label for="f-notify">Send notification when overdue</label>
          </div>
        </div>
        <div class="form-checkbox">
          <input type="checkbox" id="f-important">
          <label for="f-important">Mark as important</label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Task</button>
        </div>
      </form>
    `;
    const dueDef = document.getElementById('f-due');
    if (dueDef && !dueDef.value) dueDef.value = todayStr() + 'T00:00';
    overlay.classList.add('open');
    setupModalEvents();
  }

  function openEditModal(id) {
    const task = getTaskById(id);
    if (!task) return;
    editingTaskId = id;
    const overlay = document.getElementById('modal-overlay');
    const modal = document.getElementById('modal');
    modal.innerHTML = `
      <div class="modal-header">
        <span class="modal-title">Edit Task</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="task-form">
        <div class="form-group">
          <label class="form-label" for="f-title">Title *</label>
          <input type="text" class="form-input" id="f-title" required value="${escHtml(task.title)}">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-notes">Notes</label>
          <textarea class="form-textarea" id="f-notes">${escHtml(task.notes || '')}</textarea>
        </div>
        <div class="form-row form-row-3">
          <div class="form-group">
            <label class="form-label" for="f-project">Project</label>
            <input type="text" class="form-input" id="f-project" value="${escHtml(task.project || '')}">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-start">Start Date</label>
            <input type="date" class="form-input" id="f-start" value="${task.startDate || ''}">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-due">Due Date & Time</label>
            <input type="datetime-local" class="form-input" id="f-due" value="${task.dueDate || ''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-priority">Priority</label>
            <select class="form-select" id="f-priority">
              <option value="low" ${task.priority === 'low' ? 'selected' : ''}>Low</option>
              <option value="medium" ${task.priority === 'medium' ? 'selected' : ''}>Medium</option>
              <option value="high" ${task.priority === 'high' ? 'selected' : ''}>High</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-status">Status</label>
            <select class="form-select" id="f-status">
              <option value="not-started" ${task.status === 'not-started' ? 'selected' : ''}>Not Started</option>
              <option value="in-progress" ${task.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
              <option value="blocked" ${task.status === 'blocked' ? 'selected' : ''}>Blocked</option>
              <option value="completed" ${task.status === 'completed' ? 'selected' : ''}>Completed</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-estimate">Est. Time</label>
            <input type="text" class="form-input" id="f-estimate" placeholder="e.g. 1h 30m" value="${task.estimatedTime ? formatEstimate(task.estimatedTime) : ''}">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-spent">Time Spent</label>
            <input type="text" class="form-input" id="f-spent" placeholder="e.g. 45m" value="${task.timeSpent ? formatEstimate(task.timeSpent) : ''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-tags">Tags (comma separated)</label>
            <input type="text" class="form-input" id="f-tags" value="${(task.tags || []).join(', ')}">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-assigned">Assigned Date</label>
            <input type="date" class="form-input" id="f-assigned" value="${task.assignedDate || todayStr()}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-reminder">Reminder</label>
            <input type="datetime-local" class="form-input" id="f-reminder" value="${task.reminder || ''}">
            <span style="font-size:0.7rem;color:var(--text-muted);">Notify me before the due date</span>
          </div>
          <div class="form-checkbox" style="padding-top:22px;">
            <input type="checkbox" id="f-notify" ${task.notify !== false ? 'checked' : ''}>
            <label for="f-notify">Send notification when overdue</label>
          </div>
        </div>
        <div class="form-checkbox">
          <input type="checkbox" id="f-important" ${task.important ? 'checked' : ''}>
          <label for="f-important">Mark as important</label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="modal-delete" style="margin-right:auto;">Delete</button>
          <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    `;
    overlay.classList.add('open');
    setupModalEvents();
    document.getElementById('modal-delete')?.addEventListener('click', () => {
      const id = editingTaskId;
      if (id) {
        closeModal();
        confirmDelete(id);
      }
    });
  }

  function setupModalEvents() {
    document.getElementById('modal-close')?.addEventListener('click', closeModal);
    document.getElementById('modal-cancel')?.addEventListener('click', closeModal);
    document.getElementById('modal-overlay')?.addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.getElementById('task-form')?.addEventListener('submit', handleFormSubmit);
    document.addEventListener('keydown', handleModalKeydown);
  }

  function handleFormSubmit(e) {
    e.preventDefault();
    let dueVal = document.getElementById('f-due').value;
    if (dueVal && dueVal.endsWith('T00:00')) dueVal = dueVal.split('T')[0];
    const data = {
      title: document.getElementById('f-title').value,
      notes: document.getElementById('f-notes').value,
      project: document.getElementById('f-project').value,
      startDate: document.getElementById('f-start').value,
      dueDate: dueVal,
      priority: document.getElementById('f-priority').value,
      status: document.getElementById('f-status').value,
      estimatedTime: parseEstimate(document.getElementById('f-estimate').value),
      timeSpent: parseEstimate(document.getElementById('f-spent').value),
      assignedDate: (document.getElementById('f-assigned') || {}).value || todayStr(),
      tags: document.getElementById('f-tags').value,
      important: document.getElementById('f-important').checked,
      notify: document.getElementById('f-notify').checked,
      reminder: document.getElementById('f-reminder').value
    };
    if (!data.title.trim()) return;
    if (editingTaskId) {
      updateTask(editingTaskId, data);
    } else {
      addTask(data);
    }
    closeModal();
  }

  function closeModal() {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('open');
    editingTaskId = null;
    document.removeEventListener('keydown', handleModalKeydown);
  }

  function handleModalKeydown(e) {
    if (e.key === 'Escape') {
      closeModal();
    }
  }

  function confirmDelete(id) {
    const task = getTaskById(id);
    if (!task) return;
    const overlay = document.getElementById('confirm-overlay');
    const dialog = document.getElementById('confirm-dialog');
    dialog.innerHTML = `
      <div class="confirm-title">Delete Task</div>
      <div class="confirm-message">Are you sure you want to delete "${escHtml(task.title)}"? This cannot be undone.</div>
      <div class="confirm-actions">
        <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Delete</button>
      </div>
    `;
    overlay.classList.add('open');

    document.getElementById('confirm-cancel')?.addEventListener('click', () => overlay.classList.remove('open'));
    document.getElementById('confirm-ok')?.addEventListener('click', () => {
      deleteTask(id);
      overlay.classList.remove('open');
    });
    overlay.addEventListener('click', e => {
      if (e.target === e.currentTarget) overlay.classList.remove('open');
    });
  }

  // ===== Dark Mode =====

  function toggleDarkMode() {
    state.darkMode = !state.darkMode;
    saveState();
    updateDarkMode();
  }

  function updateDarkMode() {
    document.documentElement.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
    const btn = document.getElementById('dark-mode-toggle');
    if (btn) btn.textContent = state.darkMode ? '☀' : '☾';
  }

  // ===== Utility =====

  function escHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ===== Export / Import =====

  function exportTasks() {
    const data = JSON.stringify({
      tasks: state.tasks,
      topPriorityIds: state.topPriorityIds,
      userName: state.userName,
      userRole: state.userRole,
      taskIdCounter
    }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tasks-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Tasks exported', 'success');
  }

  function importTasks() {
    const input = document.getElementById('import-input');
    const file = input?.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.tasks && Array.isArray(data.tasks)) {
          state.tasks = data.tasks;
          if (data.topPriorityIds) state.topPriorityIds = data.topPriorityIds;
          if (data.userName) state.userName = data.userName;
          if (data.userRole) state.userRole = data.userRole;
          if (data.taskIdCounter) taskIdCounter = data.taskIdCounter;
          saveState();
          closeModal();
          render();
          showToast(`Imported ${data.tasks.length} tasks`, 'success');
        } else {
          showToast('Invalid file format', 'error');
        }
      } catch (err) {
        showToast('Failed to import: ' + err.message, 'error');
      }
    };
    reader.readAsText(file);
    input.value = '';
  }

  function applyState(saved) {
    state.tasks = saved.tasks || [];
    state.view = saved.view || 'today';
    state.darkMode = saved.darkMode || false;
    state.topPriorityIds = saved.topPriorityIds || [];
    state.userName = saved.userName || 'User';
    state.userRole = saved.userRole || 'ETL & AI Developer';
    taskIdCounter = saved.taskIdCounter || Date.now();
    if (saved.searchQuery) state.searchQuery = saved.searchQuery;
    if (saved.sortBy) state.sortBy = saved.sortBy;
    if (saved.filterPriority) state.filterPriority = saved.filterPriority;
    if (saved.filterStatus) state.filterStatus = saved.filterStatus;
  }

  function loadFromLocal() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { applyState(JSON.parse(raw)); return true; }
    } catch(e) {}
    return false;
  }

  function saveToLocal() {
    const data = {
      tasks: state.tasks,
      view: state.view,
      darkMode: state.darkMode,
      topPriorityIds: state.topPriorityIds,
      userName: state.userName,
      userRole: state.userRole,
      searchQuery: state.searchQuery,
      sortBy: state.sortBy,
      filterPriority: state.filterPriority,
      filterStatus: state.filterStatus,
      taskIdCounter
    };
    const json = JSON.stringify(data);
    try { localStorage.setItem(STORAGE_KEY, json); } catch(e) { console.warn('localStorage save failed:', e); }
    try { setCookie(STORAGE_KEY, json, 365); } catch(e) {}
  }

  function saveState() {
    saveToLocal();
  }

  function loadState() {
    loadFromLocal();
    if (!state.tasks || state.tasks.length === 0) {
      state.tasks = [];
      saveToLocal();
    }
  }

  // ===== Init =====

  function init() {
    loadState();
    setupEventListeners();
    render();
    requestNotifPermission();
    registerSW();
    checkOverdueNotifs();
    checkReminders();
    checkHourlySummary();
    setInterval(checkOverdueNotifs, 30000);
    setInterval(checkReminders, 30000);
    setInterval(checkHourlySummary, 60000);
  }

  function setupEventListeners() {
    document.getElementById('dark-mode-toggle')?.addEventListener('click', toggleDarkMode);

    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    function closeSidebar() { sidebar?.classList.remove('open'); hamburger?.classList.remove('open'); backdrop?.classList.remove('open'); }
    hamburger?.addEventListener('click', () => {
      sidebar?.classList.toggle('open');
      hamburger?.classList.toggle('open');
      backdrop?.classList.toggle('open');
    });
    backdrop?.addEventListener('click', closeSidebar);
    document.querySelectorAll('.sidebar-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.view = btn.dataset.view;
        state.selectedDate = null;
        state.searchQuery = '';
        state.filterPriority = 'all';
        state.filterStatus = 'all';
        state.sortBy = 'priority';
        const searchInput = document.getElementById('search-input');
        if (searchInput) searchInput.value = '';
        saveState();
        render();
        closeSidebar();
      });
    });

    document.querySelectorAll('.task-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.task-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        if (f === 'all') { state.filterPriority = 'all'; state.filterStatus = 'all'; }
        else if (f === 'high') { state.filterPriority = 'high'; state.filterStatus = 'all'; }
        else if (f === 'pending') { state.filterPriority = 'all'; state.filterStatus = 'pending'; }
        else if (f === 'completed') { state.filterPriority = 'all'; state.filterStatus = 'completed'; }
        saveState();
        renderTaskList();
      });
    });

    const searchInput = document.getElementById('search-input');
    if (searchInput) {
      searchInput.addEventListener('input', e => {
        state.searchQuery = e.target.value;
        saveState();
        renderTaskList();
      });
    }

    document.getElementById('add-task-btn')?.addEventListener('click', openAddModal);

    document.querySelector('.profile-card')?.addEventListener('click', openSettings);

    document.getElementById('import-input')?.addEventListener('change', importTasks);

    document.addEventListener('keydown', e => {
      if (e.key === 'n' && !e.ctrlKey && !e.metaKey && !e.target.closest('input,textarea,select')) {
        e.preventDefault();
        openAddModal();
      }
      if (e.key === '/' && !e.target.closest('input,textarea,select')) {
        e.preventDefault();
        document.getElementById('search-input')?.focus();
      }
    });

    const hint = document.getElementById('kbd-hint');
    let hintTimer;
    if (hint) {
      hint.classList.add('visible');
      clearTimeout(hintTimer);
      hintTimer = setTimeout(() => hint.classList.remove('visible'), 4000);
    }
  }

  return { init };
})();

document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
